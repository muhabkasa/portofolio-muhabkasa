<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--text:#f0f0f0;--muted:#888;--accent:#e63946}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Space Grotesk',sans-serif;
      min-height:100vh;display:flex;
      flex-direction:column;align-items:center;
      justify-content:center;text-align:center;
      padding:24px;
    }
    .code{
      font-size:clamp(6rem,20vw,12rem);
      font-weight:700;line-height:1;
      color:transparent;
      -webkit-text-stroke:2px var(--accent);
    }
    h1{font-size:clamp(1.2rem,3vw,1.8rem);margin:16px 0 8px}
    p{color:var(--muted);font-size:0.95rem;max-width:360px}
    a{
      display:inline-block;margin-top:32px;
      padding:12px 28px;border-radius:10px;
      background:var(--accent);color:#fff;
      text-decoration:none;font-weight:600;
      transition:opacity 0.2s;
    }
    a:hover{opacity:0.85}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Halaman tidak ditemukan</h1>
  <p>URL yang kamu akses tidak ada atau sudah dipindahkan.</p>
  <a href="/">← Kembali ke Beranda</a>
</body>
</html>
